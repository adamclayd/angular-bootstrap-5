<html lang="en" ng-app="app">
	<head>
    	<meta charset="UTF-8">
    	<title>BootStrap 5 for Angular JS </title>
		<link rel="stylesheet" href="../lib/css/bootstrap.min.css">
		<link rel="stylesheet" href="../lib/css/bootstrap-icons/bootstrap-icons.css">
		<link rel="stylesheet" href="demo.css">
	</head>
	<body>
		<div class="px-5 mx-5" ng-controller="MainController">
			<h5>Collapsible</h5>
			<div class="row">
				<div class="col-12 col-md-8">
					<div class="mb-2">
						<button type="button" class="btn btn-sm btn-primary me-2" ng-click="collapse.toggle()">Toggle</button>
						<div class="form-check form-check-inline">
							<input class="form-check-input" type="checkbox" ng-model="collapse.horizontal">
							<label class="form-check-label">Animate Horizontal</label>
						</div>
					</div>
					<div bs5-collapse="collapse.collapsed" horizontal="collapse.horizontal" class="border border-dark-subtle p-3">
						<div ng-bind="collapse.content"></div>
					</div>
					<br><br><br><br>
					<h5>Accordion</h5>
					<bs5-accordion>
						<bs5-accordion-group ng-repeat="g in acc">
							<bs5-accordion-heading><i class="{{g.header.icon}}"></i> {{g.header.text}}</bs5-accordion-heading>
							{{g.content}}
						</bs5-accordion-group>
					</bs5-accordion>
					<br><br><br><br>
				</div>
				<h5>Tabs</h5>
				<div class="row">
					<div class="col-12 col-md-4" class="pe-md-3">
						<div class="fs-6">Tab Left</div>
						<div class="border border-dark-subtle" id="left-tabset">
							<bs5-tabset placement="left">
								<bs5-tab ng-repeat="g in sets[0]">
									<bs5-tab-heading><i class="{{g.header.icon}}"></i> {{g.header.text}}</bs5-tab-heading>
									{{g.content}}
								</bs5-tab>
							</bs5-tabset>
						</div>
					</div>
					<div class="col-12 col-md-4" class="pe-md-3">
						<div class="fs-6">Tab Top</div>
						<div class="border border-dark-subtle" id="tabset-top">
							<bs5-tabset>
								<bs5-tab ng-repeat="g in sets[1]">
									<bs5-tab-heading><i class="{{g.header.icon}}"></i> {{g.header.text}}</bs5-tab-heading>
									{{g.content}}
								</bs5-tab>
							</bs5-tabset>
						</div>
					</div>
					<div class="col-12 col-md-4 pe-md-3">
						<div class="fs-6">Tab Right</div>
						<div class="border border-dark-subtle" id="right-tabset">
							<bs5-tabset placement="right">
								<bs5-tab ng-repeat="g in sets[2]">
									<bs5-tab-heading><i class="{{g.headre.icon}}"></i> {{g.header.text}}</bs5-tab-heading>
									{{g.content}}
								</bs5-tab>
							</bs5-tabset>
						</div>
					</div>
				</div>
			</div>
		</div>
		<script src="faker.js"></script>
		<script src="../lib/js/angular.js"></script>
		<script src="../lib/js/angular-sanitize.js"></script>
		<script src="../build/angularjs-bootstrap-5.js"></script>
		<script src="demo.js"></script>
	</body>
</html>
